{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Скрытые работы через fetch</h3>
    <a href="{% url 'hid_work-create' %}" class="btn btn-primary">Создать скрытую работу</a>
  </div>

  <div class="mb-4">
    <label for="working_documentation" class="form-label">Рабочая документация</label>
    <select id="working_documentation" class="form-select">
        <option value="">Все</option>
        {%for doc in working_documentations%}
        <option value="{{doc.id}}"
            {% if selected_working_documentation|add:"0" == doc.id %}selected{% endif %}>
            {{ doc.designation }} - {{ doc.title }}
        </option>
        {% endfor %}
      {% comment %} <option value="theory">Теория</option>
      <option value="practice">Практика</option>
      <option value="live">Онлайн</option> {% endcomment %}
    </select>
  </div>

  <div id="hid_works-list" class="row"></div>
</div>

<script>
  const workingDocumentationSelect = document.querySelector("#working_documentation");
  const hidWorksList = document.querySelector("#hid_works-list");

  function renderHidWorks(hid_works) {
    const html = hid_works.map((hid_work) => `
      <div class="col-md-4 mb-4">
        <div class="card h-100">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">${hid_work.title}</h5>
            <p class="card-text">${hid_work.description}</p>
            <span class="badge text-bg-light text-dark border mb-3 align-self-start">
              ${hid_work.working_documentation_display}
            </span>
            <a href="/hid_works/${hid_work.slug}/" class="btn btn-primary mt-auto align-self-start">
              К уроку
            </a>
          </div>
        </div>
      </div>
    `).join("");

    hidWorksList.innerHTML = html;
  }

  async function loadHidWorks() {
    const workingDocumentation = workingDocumentationSelect.value;
    const url = workingDocumentation ? `/hid_works/hid_work-json/?working_documentation=${workingDocumentation}` : "/hid_works/hid_work-json/";
    const response = await fetch(url);
    const hid_works = await response.json();

    renderHidWorks(hid_works);
  }

  workingDocumentationSelect.addEventListener("change", loadHidWorks);

  loadHidWorks();
</script>
{% endblock %}
